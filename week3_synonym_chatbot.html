<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Week 3 — Synonym-Aware Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0c0f0d;
    --surface: #131916;
    --surface2: #192020;
    --border: #263030;
    --accent: #34d399;
    --accent2: #10b981;
    --user-bubble: #0c2a1e;
    --bot-bubble: #161e1a;
    --text: #e6f0ea;
    --text-muted: #6b8a78;
    --highlight: #fbbf24;
    --mapped: #a78bfa;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .wrapper { width: 100%; max-width: 780px; display: flex; flex-direction: column; height: 92vh; }
  .header {
    display: flex; align-items: center; gap: 12px;
    padding: 1.2rem 1.5rem;
    background: var(--surface); border: 1px solid var(--border);
    border-bottom: none; border-radius: 16px 16px 0 0;
  }
  .bot-avatar {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; flex-shrink: 0;
  }
  .header-info h1 { font-family: var(--font-head); font-size: 1rem; font-weight: 700; }
  .header-info p { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
  .status-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .week-tag { margin-left: auto; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; font-size: 0.65rem; color: var(--accent); letter-spacing: 0.05em; }
  .main { flex: 1; display: flex; overflow: hidden; border: 1px solid var(--border); border-top: none; border-bottom: none; }
  .chat-area { flex: 1; background: var(--surface); padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; scroll-behavior: smooth; }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  /* Synonym panel */
  .syn-panel { width: 250px; background: #080d0b; border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  .syn-header { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.65rem; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
  .syn-dot { width: 6px; height: 6px; background: var(--mapped); border-radius: 50%; animation: pulse 1.5s infinite; }
  .syn-content { flex: 1; overflow-y: auto; padding: 0.75rem; font-size: 0.68rem; }
  .syn-content::-webkit-scrollbar { width: 3px; }
  .syn-section { margin-bottom: 1rem; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .syn-label { font-size: 0.6rem; color: var(--highlight); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .syn-map-row { display: flex; align-items: center; gap: 4px; margin: 3px 0; flex-wrap: wrap; }
  .syn-orig { background: rgba(167,139,250,0.12); border: 1px solid rgba(167,139,250,0.25); color: var(--mapped); border-radius: 4px; padding: 2px 6px; font-size: 0.65rem; }
  .syn-arrow { color: var(--text-muted); font-size: 0.6rem; }
  .syn-norm { background: rgba(52,211,153,0.12); border: 1px solid rgba(52,211,153,0.25); color: var(--accent); border-radius: 4px; padding: 2px 6px; font-size: 0.65rem; }
  .syn-token { display: inline-block; background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.15); color: var(--accent); border-radius: 4px; padding: 1px 5px; margin: 2px; font-size: 0.62rem; }
  .syn-empty { color: var(--text-muted); font-style: italic; font-size: 0.65rem; }
  .intent-badge { background: rgba(251,191,36,0.12); border: 1px solid rgba(251,191,36,0.25); color: var(--highlight); border-radius: 6px; padding: 4px 8px; font-size: 0.7rem; font-weight: 600; display: inline-block; }
  /* Messages */
  .msg-row { display: flex; gap: 10px; animation: fadeUp 0.25s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg-row.user { flex-direction: row-reverse; }
  .msg-avatar { width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; margin-top: 2px; }
  .msg-row.bot .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .msg-row.user .msg-avatar { background: var(--user-bubble); border: 1px solid var(--accent); }
  .bubble { max-width: 80%; padding: 0.7rem 1rem; border-radius: 12px; font-size: 0.82rem; line-height: 1.6; }
  .msg-row.bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .msg-row.user .bubble { background: var(--user-bubble); border: 1px solid rgba(52,211,153,0.25); border-top-right-radius: 4px; }
  .bubble-time { font-size: 0.6rem; color: var(--text-muted); margin-top: 4px; display: block; }
  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
  .typing span { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
  .input-area { display: flex; gap: 8px; padding: 1rem 1.2rem; background: var(--surface2); border: 1px solid var(--border); border-top: 1px solid var(--border); border-radius: 0 0 16px 16px; align-items: center; }
  .input-area input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 0.65rem 1rem; color: var(--text); font-family: var(--font-mono); font-size: 0.82rem; outline: none; transition: border-color 0.2s; }
  .input-area input:focus { border-color: var(--accent); }
  .input-area input::placeholder { color: var(--text-muted); }
  .send-btn { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 10px; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; transition: opacity 0.2s, transform 0.15s; flex-shrink: 0; }
  .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
  .syn-dict-section { margin-bottom: 0.8rem; }
  .syn-dict-key { font-size: 0.62rem; color: var(--accent); font-weight: 600; margin-bottom: 3px; }
  .syn-dict-vals { display: flex; flex-wrap: wrap; gap: 3px; }
  .syn-dict-val { background: rgba(52,211,153,0.07); border: 1px solid rgba(52,211,153,0.15); color: var(--text-muted); border-radius: 4px; padding: 1px 5px; font-size: 0.6rem; }
  @media(max-width:600px) { .syn-panel { display: none; } .wrapper { height: 100vh; } .header, .input-area { border-radius: 0; } }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="bot-avatar">🔄</div>
    <div class="header-info">
      <h1>CampusBot <span style="color:var(--accent);font-size:0.75rem;">+ Synonyms</span></h1>
      <p><span class="status-dot"></span>Synonym mapping pipeline active</p>
    </div>
    <div class="week-tag">WEEK 3 · SYNONYMS</div>
  </div>
  <div class="main">
    <div class="chat-area" id="chatArea"></div>
    <div class="syn-panel">
      <div class="syn-header"><div class="syn-dot"></div>Synonym Engine</div>
      <div class="syn-content" id="synContent">
        <div style="margin-bottom:1rem">
          <div class="syn-label">📖 Synonym Dictionary</div>
          <div id="dictPreview"></div>
        </div>
        <div class="syn-empty">Type a message to see synonym mapping in action.</div>
      </div>
    </div>
  </div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder='Try "tuition" or "enroll" or "dorm"...' autocomplete="off"/>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
// ─── SYNONYM DICTIONARY ─────────────────────────────────────
// canonical_keyword: [synonyms...]
const SYNONYMS = {
  "fee":         ["tuition","cost","price","charge","payment","money","amount","rate","pay","afford","expensive","cheap"],
  "admission":   ["apply","application","enroll","enrollment","join","register","registration","intake","enter","entry","get in"],
  "exam":        ["test","examination","assessment","paper","quiz","evaluation","viva","practical","result","marks","grade","score"],
  "hostel":      ["dorm","dormitory","accommodation","room","stay","lodge","residential","housing","pg","boarding"],
  "scholarship": ["merit","financial aid","stipend","waiver","discount","bursary","fellowship","grant","free","reduction"],
  "placement":   ["job","career","internship","recruit","hire","company","salary","package","campus drive","offer"],
  "library":     ["book","resource","journal","study","reading","e-library","digital","borrow","issue","catalogue"],
  "contact":     ["phone","email","address","reach","call","helpdesk","support","enquiry","inquiry","number"],
  "timing":      ["time","schedule","hour","open","close","when","office","working hours","duration"],
  "course":      ["program","branch","stream","department","subject","syllabus","curriculum","btech","mtech","mba","mca"],
  "canteen":     ["food","eat","meal","lunch","dinner","breakfast","mess","cafe","cafeteria","snack","menu"],
  "sport":       ["gym","ground","fitness","cricket","football","badminton","club","activity","fest","event"],
  "hello":       ["hi","hey","greet","start","help","what","about","welcome","yo","good morning","good evening"],
  "wifi":        ["internet","network","connectivity","broadband","connection","online","lab","computer","system"]
};

// ─── FAQ DATA ────────────────────────────────────────────────
const faqs = [
  { key: "fee",         answer: "📋 <b>Fee Structure:</b><br>• B.Tech: ₹2,10,000/year<br>• M.Tech: ₹1,80,000/year<br>• Hostel + Mess: ₹90,000/year" },
  { key: "admission",   answer: "📝 <b>Admission:</b><br>1. Online form at symbiosis.ac.in<br>2. SET/JEE entrance<br>3. Counselling & verification<br>4. Confirmation payment" },
  { key: "exam",        answer: "📖 <b>Exams:</b><br>• Mid-Sem: Oct & Mar<br>• End-Sem: Nov & May<br>• Results in 3 weeks<br>• Revaluation window: 7 days" },
  { key: "hostel",      answer: "🏠 <b>Hostel:</b><br>• Separate boys & girls blocks<br>• AC & Non-AC rooms<br>• 24/7 security & Wi-Fi<br>• Mess: ₹3,500/month" },
  { key: "scholarship", answer: "🏆 <b>Scholarships:</b><br>• Merit (>90%): 25% fee waiver<br>• Sports quota: Up to 50%<br>• Govt SC/ST/OBC schemes" },
  { key: "placement",   answer: "💼 <b>Placements 2024:</b><br>• Avg: ₹6.2 LPA | Highest: ₹32 LPA<br>• Recruiters: TCS, Infosys, Wipro<br>• Placement rate: 85%+" },
  { key: "library",     answer: "📚 <b>Library:</b><br>• 50,000+ books, 200+ journals<br>• INFLIBNET digital access<br>• Issue: 3 books / 14 days" },
  { key: "contact",     answer: "📞 <b>Contact:</b><br>Phone: +91-712-XXXXXXX<br>Email: info@sitng.edu.in" },
  { key: "timing",      answer: "🕘 <b>Timings:</b><br>• Classes: 8 AM – 5 PM<br>• Library: 8 AM – 9 PM<br>• Admin: 9:30 AM – 5:30 PM" },
  { key: "course",      answer: "🎓 <b>Programs:</b><br>B.Tech: CSE, IT, ECE, Mech, Civil<br>M.Tech: CSE, ECE, Structural<br>MBA, MCA available" },
  { key: "canteen",     answer: "🍽️ <b>Canteen:</b><br>• Veg & non-veg daily<br>• Mess subscription: ₹3,500/month<br>• Open 7:30 AM – 8:00 PM" },
  { key: "sport",       answer: "⚽ <b>Sports & Fests:</b><br>• Cricket, Football, Badminton, Chess<br>• Annual fest: SPARDHA & SYMBIOZA<br>• 20+ clubs available" },
  { key: "hello",       answer: "👋 <b>Hello!</b> I'm CampusBot with synonym understanding!<br><br>Try using alternate words — <b>tuition</b> instead of fees, <b>dorm</b> instead of hostel!" },
  { key: "wifi",        answer: "💻 <b>Digital Infrastructure:</b><br>• Campus-wide 1Gbps Wi-Fi<br>• 5 labs, 300+ systems<br>• MATLAB, Ansys, AutoCAD licensed" }
];

const STOPWORDS = new Set(["a","an","the","is","it","in","on","at","to","for","of","and","or","but","be","was","are","were","this","that","i","me","my","we","you","he","she","they","do","does","did","have","has","had","will","would","can","could","should","may","might","what","when","where","which","who","how","why","about","with","from","by","its","their","our","your","just","so","if","than","also","too","here","any","all"]);
const TYPO_MAP = { "feee":"fee","fess":"fees","hostle":"hostel","addmission":"admission","scolarship":"scholarship","placment":"placement","libary":"library","exm":"exam","conatct":"contact" };

// ─── REVERSE LOOKUP: synonym → canonical ────────────────────
const SYNONYM_LOOKUP = {};
for (const [canonical, syns] of Object.entries(SYNONYMS)) {
  SYNONYM_LOOKUP[canonical] = canonical; // self
  for (const s of syns) SYNONYM_LOOKUP[s] = canonical;
}

function preprocessTokens(raw) {
  const lower = raw.toLowerCase().replace(/[^a-z0-9\s]/g, '');
  const tokens = lower.trim().split(/\s+/).filter(Boolean);
  const corrected = tokens.map(w => TYPO_MAP[w] || w);
  const filtered = corrected.filter(w => !STOPWORDS.has(w));
  return filtered;
}

function mapSynonyms(tokens) {
  const mappings = [];
  const normalized = [];
  for (const token of tokens) {
    const canonical = SYNONYM_LOOKUP[token];
    if (canonical) {
      normalized.push(canonical);
      if (canonical !== token) mappings.push({ original: token, canonical });
    } else {
      normalized.push(token);
    }
  }
  return { normalized, mappings };
}

function findAnswer(normalizedTokens) {
  for (const faq of faqs) {
    if (normalizedTokens.includes(faq.key)) return { answer: faq.answer, matched: faq.key };
  }
  return null;
}

// ─── DEBUG PANEL ─────────────────────────────────────────────
function updateSynPanel(tokens, mappings, normalizedTokens, matched) {
  const panel = document.getElementById('synContent');
  let html = '<div style="margin-bottom:1rem"><div class="syn-label">📖 Synonym Dictionary</div><div id="dictPreview">';

  // mini dict preview (top 5)
  const entries = Object.entries(SYNONYMS).slice(0, 5);
  for (const [key, vals] of entries) {
    html += `<div class="syn-dict-section"><div class="syn-dict-key">${key}</div><div class="syn-dict-vals">${vals.slice(0,4).map(v=>`<span class="syn-dict-val">${v}</span>`).join('')}${vals.length>4?`<span class="syn-dict-val">+${vals.length-4}</span>`:''}</div></div>`;
  }
  html += '</div></div>';

  html += `<div class="syn-section"><div class="syn-label">① Preprocessed Tokens</div><div>${tokens.map(t=>`<span class="syn-token">${t}</span>`).join('') || '<span class="syn-empty">none</span>'}</div></div>`;

  if (mappings.length > 0) {
    html += `<div class="syn-section"><div class="syn-label">② Synonym Mappings (${mappings.length})</div>`;
    for (const m of mappings) {
      html += `<div class="syn-map-row"><span class="syn-orig">${m.original}</span><span class="syn-arrow">→</span><span class="syn-norm">${m.canonical}</span></div>`;
    }
    html += '</div>';
  } else {
    html += `<div class="syn-section"><div class="syn-label">② Synonym Mappings</div><div class="syn-empty">No synonyms mapped</div></div>`;
  }

  html += `<div class="syn-section"><div class="syn-label">③ Normalized Tokens</div><div>${normalizedTokens.map(t=>`<span class="syn-token" style="color:var(--accent)">${t}</span>`).join('') || '<span class="syn-empty">none</span>'}</div></div>`;

  if (matched) {
    html += `<div class="syn-section"><div class="syn-label">④ Matched FAQ Key</div><div class="intent-badge">✅ ${matched}</div></div>`;
  } else {
    html += `<div class="syn-section"><div class="syn-label">④ Matched FAQ Key</div><div class="syn-empty">No match found</div></div>`;
  }

  panel.innerHTML = html;
}

// ─── MESSAGING ───────────────────────────────────────────────
function getTime() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

function addMessage(content, type) {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = `msg-row ${type}`;
  const avatar = document.createElement('div'); avatar.className = 'msg-avatar'; avatar.textContent = type === 'bot' ? '🔄' : '👤';
  const bubble = document.createElement('div'); bubble.className = 'bubble'; bubble.innerHTML = content;
  const time = document.createElement('span'); time.className = 'bubble-time'; time.textContent = getTime();
  bubble.appendChild(time);
  row.appendChild(avatar); row.appendChild(bubble);
  area.appendChild(row); area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const row = document.createElement('div'); row.className = 'msg-row bot'; row.id = 'typing-indicator';
  const av = document.createElement('div'); av.className = 'msg-avatar'; av.textContent = '🔄';
  const b = document.createElement('div'); b.className = 'bubble';
  b.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  row.appendChild(av); row.appendChild(b);
  area.appendChild(row); area.scrollTop = area.scrollHeight;
}
function removeTyping() { const el = document.getElementById('typing-indicator'); if(el) el.remove(); }

function sendMessage() {
  const input = document.getElementById('userInput');
  const raw = input.value.trim();
  if (!raw) return;

  addMessage(raw.replace(/</g,'&lt;'), 'user');
  input.value = '';

  const tokens = preprocessTokens(raw);
  const { normalized, mappings } = mapSynonyms(tokens);
  const result = findAnswer(normalized);

  updateSynPanel(tokens, mappings, normalized, result ? result.matched : null);
  console.log('[Week 3 Synonym Pipeline]', { tokens, mappings, normalized });

  showTyping();
  setTimeout(() => {
    removeTyping();
    if (result) {
      addMessage(result.answer, 'bot');
    } else {
      addMessage("🤔 Couldn't match that. Try: <b>tuition, enroll, dorm, merit, placement, timetable, cafeteria</b>", 'bot');
    }
  }, 600);
}

document.getElementById('userInput').addEventListener('keydown', e => { if(e.key==='Enter') sendMessage(); });

// Init dict preview
function initDictPreview() {
  const panel = document.getElementById('synContent');
  let html = '<div style="margin-bottom:1rem"><div class="syn-label" style="color:var(--accent)">📖 Synonym Dictionary Preview</div>';
  for (const [key, vals] of Object.entries(SYNONYMS)) {
    html += `<div class="syn-dict-section"><div class="syn-dict-key">${key}</div><div class="syn-dict-vals">${vals.slice(0,4).map(v=>`<span class="syn-dict-val">${v}</span>`).join('')}${vals.length>4?`<span class="syn-dict-val">+${vals.length-4} more</span>`:''}</div></div>`;
  }
  html += '</div><div class="syn-empty">Type a message to see synonym mapping in action →</div>';
  panel.innerHTML = html;
}

window.onload = () => {
  initDictPreview();
  setTimeout(() => {
    addMessage("🔄 <b>Week 3: Synonym-Aware Bot!</b><br><br>This bot understands alternate words.<br><br>Try asking:<br>• <b>\"What is the tuition?\"</b> → maps to <i>fee</i><br>• <b>\"How do I enroll?\"</b> → maps to <i>admission</i><br>• <b>\"Is there a dorm?\"</b> → maps to <i>hostel</i><br><br>Check the <b>Synonym Engine</b> panel →", 'bot');
  }, 300);
};
</script>
</body>
</html>
