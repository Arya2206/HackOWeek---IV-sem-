<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Week 7 — Context-Aware Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#04090e;--s1:#080e15;--s2:#0d1520;--s3:#12202e;--border:#1a2d40;
  --text:#c8dce8;--muted:#3d5a70;
  --acc:#22d3ee;--acc2:#0891b2;
  --ctx:#f59e0b;--ctx2:#d97706;
  --font:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.wrapper{width:100%;max-width:820px;height:93vh;display:flex;flex-direction:column}
.header{background:var(--s1);border:1px solid var(--border);border-bottom:none;border-radius:16px 16px 0 0;padding:1rem 1.4rem;display:flex;align-items:center;gap:12px}
.avatar{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.hinfo h1{font-size:.95rem;font-weight:700}
.hinfo p{font-size:.68rem;color:var(--muted);margin-top:1px}
.pulse{display:inline-block;width:7px;height:7px;background:#4ade80;border-radius:50%;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.wtag{margin-left:auto;background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:3px 9px;font-size:.62rem;color:var(--acc);font-family:var(--mono)}
.body{flex:1;display:flex;overflow:hidden;border:1px solid var(--border);border-top:none;border-bottom:none}
.chat{flex:1;background:var(--s1);padding:1.4rem;overflow-y:auto;display:flex;flex-direction:column;gap:.9rem;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:var(--border)}

/* Context panel */
.cpanel{width:250px;background:#030810;border-left:1px solid var(--border);display:flex;flex-direction:column}
.cp-head{padding:.65rem .9rem;border-bottom:1px solid var(--border);font-size:.6rem;color:var(--ctx);letter-spacing:.1em;text-transform:uppercase;font-family:var(--mono);display:flex;align-items:center;gap:6px}
.cp-dot{width:5px;height:5px;border-radius:50%;background:var(--ctx);animation:pulse 1.5s infinite}
.cp-body{flex:1;overflow-y:auto;padding:.8rem;font-size:.67rem}
.cp-body::-webkit-scrollbar{width:3px}
.cs{margin-bottom:.9rem;animation:fade .3s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.cl{font-size:.57rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;font-family:var(--mono)}
.cv{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:6px 8px;color:var(--text);word-break:break-word;line-height:1.5;font-size:.65rem}
.cv.active{border-color:var(--ctx);color:var(--ctx);background:rgba(245,158,11,.06)}
.cv.none{color:var(--muted);font-style:italic}
/* History log */
.hlog{display:flex;flex-direction:column;gap:4px}
.hlog-row{display:flex;gap:6px;align-items:flex-start}
.hlog-turn{font-size:.55rem;color:var(--muted);font-family:var(--mono);flex-shrink:0;margin-top:2px}
.hlog-intent{font-size:.6rem;padding:2px 6px;border-radius:4px;background:rgba(34,211,238,.1);color:var(--acc);border:1px solid rgba(34,211,238,.2)}
.hlog-intent.ctx{background:rgba(245,158,11,.1);color:var(--ctx);border-color:rgba(245,158,11,.25)}
/* Conversation flow arrows */
.flow-line{width:1px;height:10px;background:var(--border);margin:0 auto 0 12px}
/* Messages */
.row{display:flex;gap:9px;animation:up .22s ease}
@keyframes up{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.row.user{flex-direction:row-reverse}
.av{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.8rem;margin-top:2px}
.row.bot .av{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#000}
.row.user .av{background:var(--s3);border:1px solid var(--border)}
.bubble{max-width:78%;padding:.65rem .95rem;border-radius:11px;font-size:.8rem;line-height:1.65}
.row.bot .bubble{background:var(--s2);border:1px solid var(--border);border-top-left-radius:3px}
.row.user .bubble{background:#091520;border:1px solid rgba(34,211,238,.2);border-top-right-radius:3px}
.bt{font-size:.58rem;color:var(--muted);margin-top:4px;display:block}
/* Context indicator on bot message */
.ctx-badge{display:inline-block;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--ctx);border-radius:5px;padding:2px 7px;font-size:.6rem;font-family:var(--mono);margin-bottom:5px}
.new-badge{display:inline-block;background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.3);color:var(--acc);border-radius:5px;padding:2px 7px;font-size:.6rem;font-family:var(--mono);margin-bottom:5px}

.dots{display:flex;gap:4px;align-items:center;padding:3px 0}
.dots span{width:5px;height:5px;background:var(--muted);border-radius:50%;animation:b 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
.input-row{display:flex;gap:7px;padding:.9rem 1.1rem;background:var(--s2);border:1px solid var(--border);border-top:1px solid var(--border);border-radius:0 0 16px 16px;align-items:center}
input[type=text]{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:.6rem .9rem;color:var(--text);font-family:var(--font);font-size:.8rem;outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:var(--acc)}
input[type=text]::placeholder{color:var(--muted)}
.sbtn{background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:9px;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:opacity .2s,transform .15s;color:#000}
.sbtn:hover{opacity:.85;transform:scale(1.05)}
.clear-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:9px;padding:0 10px;height:40px;cursor:pointer;font-size:.7rem;font-family:var(--mono);transition:all .2s;white-space:nowrap}
.clear-btn:hover{border-color:var(--acc);color:var(--acc)}
@media(max-width:600px){.cpanel{display:none}.wrapper{height:100vh}.header,.input-row{border-radius:0}}
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="avatar">🧩</div>
    <div class="hinfo">
      <h1>CampusBot <span style="color:var(--acc);font-size:.75rem">+ Context Handling</span></h1>
      <p><span class="pulse"></span>Multi-turn memory · follow-up resolution</p>
    </div>
    <div class="wtag">WEEK 7 · CONTEXT</div>
  </div>
  <div class="body">
    <div class="chat" id="chat"></div>
    <div class="cpanel">
      <div class="cp-head"><div class="cp-dot"></div>Context State</div>
      <div class="cp-body" id="cpBody">
        <div class="cs"><div class="cl">Current Topic</div><div class="cv none" id="ctxTopic">none</div></div>
        <div class="cs"><div class="cl">Last Intent</div><div class="cv none" id="ctxIntent">none</div></div>
        <div class="cs"><div class="cl">Last Entities</div><div class="cv none" id="ctxEntities">none</div></div>
        <div class="cs"><div class="cl">Follow-up?</div><div class="cv none" id="ctxFollowup">—</div></div>
        <div class="cs">
          <div class="cl">Turn History</div>
          <div class="hlog" id="hlogEl"><div style="color:var(--muted);font-style:italic;font-size:.62rem">No turns yet</div></div>
        </div>
      </div>
    </div>
  </div>
  <div class="input-row">
    <input type="text" id="inp" placeholder='Try "When is exam?" then "For third year CSE?"' autocomplete="off"/>
    <button class="sbtn" onclick="send()">➤</button>
    <button class="clear-btn" onclick="clearCtx()">↺ Reset</button>
  </div>
</div>

<script>
// ─── CONTEXT STATE ────────────────────────────────────────────
let CTX = {
  topic: null,        // last detected intent
  entities: {},       // last extracted entities {SEMESTER, BRANCH, YEAR, COURSE}
  turnHistory: [],    // [{turn, userMsg, intent, isFollowup}]
  turnCount: 0
};

// ─── INTENT KEYWORDS ─────────────────────────────────────────
const INTENTS = {
  exams:       ["exam","test","paper","assessment","result","marks","grade","score","revaluation","viva","mid","end","semester exam"],
  timetable:   ["timetable","time table","schedule","class","lecture","timing","slot","period"],
  fees:        ["fee","fees","cost","tuition","payment","charge","amount","money","pay","expensive"],
  hostel:      ["hostel","dorm","room","accommodation","stay","lodge","mess","warden","boarding"],
  placement:   ["placement","job","internship","career","recruit","salary","package","company","lpa"],
  scholarships:["scholarship","merit","waiver","financial","grant","stipend","aid","discount"],
  library:     ["library","book","borrow","journal","resource","inflibnet","catalogue"],
  contact:     ["contact","phone","email","address","reach","helpdesk","number"]
};

// ─── ENTITY PATTERNS ─────────────────────────────────────────
const EPATTERNS = [
  { key:'SEMESTER', re:/\bsem(?:ester)?\s*([1-8])\b/i,       val: m=>`Sem ${m[1]}` },
  { key:'YEAR',     re:/\b([1-4])(?:st|nd|rd|th)\s+year\b/i, val: m=>`Year ${m[1]}` },
  { key:'BRANCH',   re:/\b(CSE|IT|ECE|MECH|CIVIL|EE|MCA|MBA)\b/i, val: m=>m[1].toUpperCase() },
  { key:'COURSE',   re:/\b([A-Z]{2,4}\s*[0-9]{3,4})\b/,      val: m=>m[1] }
];

function detectIntent(raw){
  const lower=raw.toLowerCase();
  let best=null,bestScore=0;
  for(const [intent,kws] of Object.entries(INTENTS)){
    const score=kws.filter(k=>lower.includes(k)).length;
    if(score>bestScore){ bestScore=score; best=intent; }
  }
  return best;
}

function extractEntities(raw){
  const ents={};
  for(const {key,re,val} of EPATTERNS){
    const m=raw.match(re);
    if(m) ents[key]=val(m);
  }
  return ents;
}

function isFollowup(raw, newIntent, newEnts){
  const lower=raw.toLowerCase();
  const followupSignals=[
    /^(for|what about|and|but|about|regarding|in|at|of|how about)\b/i,
    /^(third|second|first|fourth|1st|2nd|3rd|4th)\b/i,
    /^(sem|semester)\s*[1-8]/i,
    /^(cse|it|ece|mech|civil)\b/i,
    /^(when|where|how|what)\s+(is|are|about)\b/i
  ];
  const short = raw.trim().split(/\s+/).length <= 5;
  const hasSignal = followupSignals.some(r=>r.test(raw.trim()));
  const noNewIntent = !newIntent && CTX.topic;
  const hasNewEntOnly = !newIntent && Object.keys(newEnts).length > 0;
  return (short && (noNewIntent || hasSignal)) || hasNewEntOnly;
}

// ─── RESPONSE BUILDER ─────────────────────────────────────────
const RESPONSES = {
  exams(ents){
    const sem=ents.SEMESTER, yr=ents.YEAR, br=ents.BRANCH;
    let r=`📖 <b>Exam Schedule`;
    if(sem) r+=` — ${sem}`;
    if(br) r+=` (${br})`;
    r+=`:</b><br>`;
    if(sem){
      const n=parseInt(sem.replace(/\D/g,''));
      r+=`• Mid-Sem: ${n%2?'October':'March'}<br>• End-Sem: ${n%2?'November':'May'}<br>`;
    } else if(yr){
      r+=`• ${yr} exams follow standard semester pattern<br>`;
    } else {
      r+=`• Odd Sem: End-Sem in November<br>• Even Sem: End-Sem in May<br>`;
    }
    if(br) r+=`• ${br} dept timetable: portal.sitng.edu.in/${br.toLowerCase()}<br>`;
    r+=`• Hall tickets issued 5 days prior.`;
    return r;
  },
  timetable(ents){
    const sem=ents.SEMESTER, br=ents.BRANCH, yr=ents.YEAR;
    let r=`🕐 <b>Class Timetable`;
    if(sem) r+=` — ${sem}`;
    if(br) r+=` (${br})`;
    r+=`:</b><br>• Morning: 8:00 AM – 12:00 PM<br>• Afternoon: 1:00 PM – 5:00 PM<br>`;
    if(yr||br) r+=`• Timetable for ${[yr,br].filter(Boolean).join(' ')} is available on the portal.`;
    else r+=`• Timetable released on portal before each semester.`;
    return r;
  },
  fees(ents){
    const br=ents.BRANCH, yr=ents.YEAR;
    let r=`💰 <b>Fee Structure`;
    if(br) r+=` — ${br}`;
    r+=`:</b><br>`;
    r+=`• B.Tech: ₹2,10,000/year<br>• M.Tech / MBA / MCA: ₹1,80,000/year<br>• Hostel + Mess: ₹90,000/year<br>• Payable in 2 installments per year`;
    return r;
  },
  hostel(ents){
    return `🏠 <b>Hostel Info:</b><br>• Separate boys & girls blocks<br>• AC & Non-AC rooms available<br>• 24/7 security + Wi-Fi<br>• Mess fee: ₹3,500/month<br>• Curfew: 9:00 PM weekdays`;
  },
  placement(ents){
    return `💼 <b>Placements 2024:</b><br>• Avg: ₹6.2 LPA | Highest: ₹32 LPA<br>• Top recruiters: TCS, Infosys, Wipro, Capgemini<br>• Placement rate: 85%+`;
  },
  scholarships(ents){
    return `🏆 <b>Scholarships:</b><br>• Merit (>90%): 25% fee waiver<br>• Sports quota: Up to 50%<br>• Govt SC/ST/OBC via NSP`;
  },
  library(ents){
    return `📚 <b>Library:</b><br>• 50,000+ books, 200+ journals<br>• INFLIBNET digital access<br>• Issue: 3 books for 14 days`;
  },
  contact(ents){
    return `📞 <b>Contact:</b><br>Phone: +91-712-XXXXXXX<br>Email: info@sitng.edu.in`;
  }
};

function getResponse(intent, entities, followup){
  const fn=RESPONSES[intent];
  if(!fn) return `🤔 I'm not sure about that. Could you rephrase? Try asking about <b>exams, fees, hostel, placement, or timetable.</b>`;
  return fn(entities);
}

// ─── PANEL UPDATES ────────────────────────────────────────────
function updatePanel(intent, entities, followup){
  document.getElementById('ctxTopic').className = intent ? 'cv active' : 'cv none';
  document.getElementById('ctxTopic').textContent = CTX.topic || 'none';
  document.getElementById('ctxIntent').className = intent ? 'cv active' : 'cv none';
  document.getElementById('ctxIntent').textContent = intent || 'none';
  const entText=Object.entries(CTX.entities).map(([k,v])=>`${k}: ${v}`).join('\n');
  document.getElementById('ctxEntities').className = Object.keys(CTX.entities).length ? 'cv active' : 'cv none';
  document.getElementById('ctxEntities').textContent = entText || 'none';
  document.getElementById('ctxFollowup').className = followup ? 'cv active' : 'cv none';
  document.getElementById('ctxFollowup').textContent = followup ? '✓ Yes — using previous context' : '✗ No — new query';

  // History log
  const log=document.getElementById('hlogEl');
  if(CTX.turnHistory.length===0){ log.innerHTML=`<div style="color:var(--muted);font-style:italic;font-size:.62rem">No turns yet</div>`; return; }
  log.innerHTML=CTX.turnHistory.slice(-6).map(h=>`
    <div class="hlog-row">
      <span class="hlog-turn">T${h.turn}</span>
      <span class="hlog-intent ${h.isFollowup?'ctx':''}">${h.intent||'?'}${h.isFollowup?' ↩':''}</span>
    </div>`).join('');
}

// ─── MESSAGING ───────────────────────────────────────────────
function ts(){ return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function addMsg(html,type,badge){
  const a=document.getElementById('chat');
  const r=document.createElement('div'); r.className=`row ${type}`;
  const av=document.createElement('div'); av.className='av'; av.textContent=type==='bot'?'🧩':'👤';
  const b=document.createElement('div'); b.className='bubble';
  if(badge && type==='bot') b.innerHTML=`<span class="${badge.cls}">${badge.text}</span><br>${html}`;
  else b.innerHTML=html;
  const t=document.createElement('span'); t.className='bt'; t.textContent=ts();
  b.appendChild(t); r.appendChild(av); r.appendChild(b);
  a.appendChild(r); a.scrollTop=a.scrollHeight;
}
function showTyping(){ const a=document.getElementById('chat'); const r=document.createElement('div'); r.className='row bot'; r.id='typ'; const av=document.createElement('div'); av.className='av'; av.textContent='🧩'; const b=document.createElement('div'); b.className='bubble'; b.innerHTML='<div class="dots"><span></span><span></span><span></span></div>'; r.appendChild(av); r.appendChild(b); a.appendChild(r); a.scrollTop=a.scrollHeight; }
function removeTyping(){ const e=document.getElementById('typ'); if(e)e.remove(); }

function send(){
  const inp=document.getElementById('inp');
  const raw=inp.value.trim(); if(!raw)return;
  addMsg(raw.replace(/</g,'&lt;'),'user');
  inp.value='';
  CTX.turnCount++;

  const newIntent=detectIntent(raw);
  const newEnts=extractEntities(raw);
  const followup=isFollowup(raw,newIntent,newEnts);

  // Merge context
  if(followup && CTX.topic){
    // Keep existing topic, merge entities
    Object.assign(CTX.entities, newEnts);
  } else {
    // New turn
    CTX.topic=newIntent;
    CTX.entities=newEnts;
  }

  CTX.turnHistory.push({ turn:CTX.turnCount, userMsg:raw, intent:CTX.topic, isFollowup:followup });
  updatePanel(newIntent, CTX.entities, followup);

  showTyping();
  setTimeout(()=>{
    removeTyping();
    const badge = followup
      ? { cls:'ctx-badge', text:'↩ Using context from previous turn' }
      : { cls:'new-badge', text:'✦ New query' };
    if(CTX.topic){
      addMsg(getResponse(CTX.topic,CTX.entities,followup),'bot',badge);
    } else {
      addMsg(`🤔 I couldn't detect a topic. Try asking about <b>exams, fees, hostel, timetable,</b> or <b>placement</b>.`,'bot',badge);
    }
  },650);
}

function clearCtx(){
  CTX={ topic:null, entities:{}, turnHistory:[], turnCount:0 };
  updatePanel(null,{},false);
  document.getElementById('chat').innerHTML='';
  setTimeout(()=>addMsg(`↺ <b>Context cleared!</b> Starting a fresh conversation.<br><br>Multi-turn example:<br><b>Turn 1:</b> <i>"When is the exam?"</i><br><b>Turn 2:</b> <i>"For SEM 5?"</i><br><b>Turn 3:</b> <i>"CSE branch?"</i><br><br>Each follow-up inherits the previous topic!`,'bot'),200);
}

document.getElementById('inp').addEventListener('keydown',e=>{ if(e.key==='Enter')send(); });
window.onload=()=>{ setTimeout(()=>addMsg(`🧩 <b>Week 7: Multi-turn Context Handling!</b><br><br>I remember what we talked about and resolve follow-up questions using previous context.<br><br><b>Example conversation:</b><br>→ <i>"When is exam?"</i><br>→ <i>"For third year?"</i> ← follow-up!<br>→ <i>"CSE branch?"</i> ← still follows up!<br><br>Watch the <b>Context State</b> panel → to see memory in action.`,'bot'),300); };
</script>
</body>
</html>
